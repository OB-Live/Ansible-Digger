<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ansible Digger Graph</title>
    <script src="lib/d3.v7.min.js"></script>
    <script src="lib/d3-graphviz.js"></script>

    <style>
        body {
            font-family: Helvetica, Arial, sans-serif;
        }

        svg {
            width: stretch; 
        }

        #graph {
            width: 100%;
            height: 90vh;
            border: 1px solid #ccc;
        }
        #playbook-links {
            margin-bottom: 1em;
        }
        #playbook-links a {
            margin-right: 1em;
        }

        .node.task:hover,
        .cluster.role:hover,
        .cluster.play:hover {
            stroke-width: 1px !important;
            stroke: #e74c3c !important;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <h1>Ansible Digger Visualization</h1>
    <div id="playbook-links"></div>
    <div id="graph"></div>
    <div id="info">Click on a node or cluster to see its ID.</div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const playbookFiles = [
                'playbook_1.yaml.dot',
                'playbook_2.yaml.dot',
                'playbook_3.yaml.dot'
            ];
            const infoPanel = d3.select("#info");
            const graphviz = d3.select("#graph").graphviz()
                .zoom(true)
                .on("end", () => setupInteractivity(graphviz));

            function renderGraph(dotFile) {
                infoPanel.text(`Loading ${dotFile}...`);
                fetch(dotFile)
                    .then(response => response.text())
                    .then(dot => {
                        graphviz.renderDot(dot);
                        infoPanel.text(`Displaying ${dotFile}. Click on a node or cluster to see its ID.`);
                    })
                    .catch(error => {
                        console.error('Error loading DOT file:', error);
                        infoPanel.text(`Error loading ${dotFile}.`);
                    });
            }

            const linkContainer = d3.select("#playbook-links");
            playbookFiles.forEach(file => {
                linkContainer.append("a")
                    .attr("href", "#")
                    .text(file.replace('.yaml.dot', ''))
                    .on("click", function (event) {
                        event.preventDefault();
                        renderGraph(file);
                    });
            });

            // Render the first playbook by default
            if (playbookFiles.length > 0) {
                renderGraph(playbookFiles[0]);
            }
        });

        function setupInteractivity(graphviz) {
            const nodes = d3.selectAll('.node, .cluster');

            nodes.on("click", function () {
                const element = d3.select(this);
                const id = element.attr('id');
                infoPanel.text(`Clicked element ID: ${id}`);

                // Simple collapse/expand logic for clusters
                if (element.classed('cluster')) {
                    toggleCluster(id);
                }
            });
        }

        // This is a simplified collapse/expand.
        // A real implementation would be more robust.
        const collapsed = new Set();
        function toggleCluster(clusterId) {
            const children = d3.selectAll(`[id^="${clusterId}_"]`); // Select children by ID prefix
            const edges = d3.selectAll('.edge');

            if (collapsed.has(clusterId)) {
                // Expand
                children.style('display', null);
                edges.filter(d => d.parent.id.startsWith(clusterId)).style('display', null);
                collapsed.delete(clusterId);
                d3.select(`#${clusterId}`).select('polygon').style('fill-opacity', null);
            } else {
                // Collapse
                children.style('display', 'none');
                // Also hide edges connected to internal nodes
                edges.filter(d => d.parent.id.startsWith(clusterId)).style('display', 'none');
                collapsed.add(clusterId);
                d3.select(`#${clusterId}`).select('polygon').style('fill-opacity', 0.7);
            }
        }
    </script>
</body>

</html>
